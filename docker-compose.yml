services:
  postgres:
    image: postgres:16
    container_name: systemfehler-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-systemfehler}
      POSTGRES_USER: ${POSTGRES_USER:-systemfehler}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-systemfehler}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
