version: "3.8"

services:
  db:
    image: postgres:15
    container_name: systemfehler-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: systemfehler
    volumes:
      - db-data:/var/lib/postgresql/data
  search:
    build: ./services/search
    container_name: systemfehler-search
    environment:
    - DATABASE_URL=postgresql://postgres:postgres@db:5432/systemfehler
    depends_on:
    - db
    ports:
    - "8000:8000"

volumes:
  db-data: