name: Deploy Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend for Pages
        run: npm run build
        working-directory: frontend
        env:
          PUBLIC_PATH: /systemfehler/
          VITE_API_URL: /api
          VITE_AI_API_URL: /api/ai
          VITE_TURNSTILE_SITE_KEY: ${{ vars.VITE_TURNSTILE_SITE_KEY }}
          VITE_AUTH0_DOMAIN: ${{ vars.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ vars.VITE_AUTH0_CLIENT_ID }}

      - name: Assemble combined deploy directory
        run: |
          mkdir -p dist-pages
          cp -r frontend/dist/. dist-pages/
          # Copy static data assets served by env.ASSETS in Pages Functions
          mkdir -p dist-pages/data/_topics
          cp data/_topics/life_events.json dist-pages/data/_topics/life_events.json
          cp data/_topics/life_event_resource_packs.json dist-pages/data/_topics/life_event_resource_packs.json
          mkdir -p dist-pages/moderation
          # Keep Pages artifact small: ship only a tiny fallback moderation queue file.
          # Production moderation data is served from Pages Functions + D1.
          if [ -f moderation/review_queue.json ] && [ "$(wc -c < moderation/review_queue.json)" -le 5242880 ]; then
            cp moderation/review_queue.json dist-pages/moderation/review_queue.json
          else
            echo '{"queue":[]}' > dist-pages/moderation/review_queue.json
          fi

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CF_PAGES_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
        with:
          wranglerVersion: "4.71.0"
          apiToken: ${{ secrets.CF_PAGES_API_TOKEN }}
          accountId: ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy ../dist-pages --project-name=systemfehler --branch=main --cwd=cloudflare-pages
