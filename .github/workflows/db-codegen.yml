name: db-codegen-check
on:
  push:
    paths: [ "migrations/**", "package.json", "pnpm-lock.yaml", "scripts/**" ]
  pull_request:
    paths: [ "migrations/**", "package.json", "pnpm-lock.yaml", "scripts/**" ]
jobs:
  codegen:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:codegen:ci
