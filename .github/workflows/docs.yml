name: Docs checks
on:
  pull_request:
    paths: ["docs/**", "PROJECT_PLAN.md", ".github/**"]
  push:
    branches: ["main"]
    paths: ["docs/**", "PROJECT_PLAN.md", ".github/**"]
jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get changed markdown files
        id: changed-md
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.md
      - uses: avto-dev/markdown-lint@v1
        if: steps.changed-md.outputs.any_changed == 'true'
        with:
          args: ${{ steps.changed-md.outputs.all_changed_files }}
          config: .markdownlint-ci.json
  linkcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Get changed markdown files
        id: changed-md
        uses: tj-actions/changed-files@v46
        with:
          files: |
            **/*.md
      - uses: lycheeverse/lychee-action@v2
        if: steps.changed-md.outputs.any_changed == 'true'
        with:
          args: --no-progress --max-concurrency 1 --retry-wait-time 2 --max-retries 2 --exclude '^http://localhost(:[0-9]+)?/' --exclude '^http://127\.0\.0\.1(:[0-9]+)?/' ${{ steps.changed-md.outputs.all_changed_files }}
